services:
  # InfluxDB Time Series Database
  influxdb:
    image: influxdb:2.7
    container_name: yolo11-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123456
      - DOCKER_INFLUXDB_INIT_ORG=jetson
      - DOCKER_INFLUXDB_INIT_BUCKET=person_detection
      - DOCKER_INFLUXDB_INIT_RETENTION=7d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=XcOGuS__bo4NKPEk0zBYlOBIRrhMXlufMaaVLgmFMObXts_mCF-43kgUWhHGKtQfTEuPITWcB57eI32qlGy5TA==
    networks:
      - yolo11-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Visualization Dashboard
  grafana:
    image: crpi-z7h4oz0xl00q2129.cn-hangzhou.personal.cr.aliyuncs.com/lorraine-jetson/yolo11-grafana:latest
    container_name: yolo11-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
    networks:
      - yolo11-network
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # YOLO11n Person Detection App（Python 脚本和模型已打包进镜像）
  yolo11-app:
    image: crpi-z7h4oz0xl00q2129.cn-hangzhou.personal.cr.aliyuncs.com/lorraine-jetson/yolo11-jetson:latest
    container_name: yolo11-app
    privileged: true
    ports:
      - "5001:5000"
    volumes:
      # TensorRT engine 持久化（首次启动自动生成，后续复用）
      - yolo-models:/app/models
      - ./yolo11n_grafana.py:/app/yolo11n_grafana.py:ro
      # === Jetson-only: host CUDA/TensorRT libraries passthrough ===
      - /usr/local/cuda:/usr/local/cuda:ro
      - /usr/lib/aarch64-linux-gnu:/usr/lib/aarch64-linux-gnu
      - /usr/lib/python3.10/dist-packages:/usr/lib/python3.10/dist-packages:ro
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=XcOGuS__bo4NKPEk0zBYlOBIRrhMXlufMaaVLgmFMObXts_mCF-43kgUWhHGKtQfTEuPITWcB57eI32qlGy5TA==
      - INFLUX_ORG=jetson
      - INFLUX_BUCKET=person_detection
      - VIDEO_SOURCE=auto
      - MAX_CAMERAS=6
      - CAMERA_TYPE=auto
      - DEVICE=auto
      - WEB_PORT=5000
      - IMGSZ=640
      - STREAM_WIDTH=640
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu
      - PYTHONPATH=/usr/lib/python3.10/dist-packages
    networks:
      - yolo11-network
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  yolo11-network:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data:
  yolo-models:
