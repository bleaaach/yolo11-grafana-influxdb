services:
  # InfluxDB Time Series Database
  influxdb:
    image: influxdb:2.7
    container_name: yolo11-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influxdb/init:/docker-entrypoint-initdb.d
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123456
      - DOCKER_INFLUXDB_INIT_ORG=jetson
      - DOCKER_INFLUXDB_INIT_BUCKET=person_detection
      - DOCKER_INFLUXDB_INIT_RETENTION=7d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=XcOGuS__bo4NKPEk0zBYlOBIRrhMXlufMaaVLgmFMObXts_mCF-43kgUWhHGKtQfTEuPITWcB57eI32qlGy5TA==
    networks:
      - yolo11-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Visualization Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: yolo11-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
    networks:
      - yolo11-network
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # YOLO11n Person Detection App
  yolo11-app:
    # 方式A：使用预构建镜像（推荐，别人无需 wheel 文件）
    image: crpi-z7h4oz0xl00q2129.cn-hangzhou.personal.cr.aliyuncs.com/lorraine-jetson/yolo11-jetson:latest
    # 方式B：本地构建（需要 wheel/ 目录中有 PyTorch wheel 文件）
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: yolo11-app
    ports:
      - "5001:5000"
    volumes:
      # TensorRT engine (device-specific, optional - app falls back to yolo11n.pt)
      # Generate on Jetson: yolo export model=yolo11n.pt format=engine device=0
      - ./yolo11n.engine:/app/yolo11n.engine:ro
      # === Jetson-only: host CUDA/TensorRT libraries passthrough ===
      # Remove these 3 lines if running on a standard x86 machine
      - /usr/local/cuda:/usr/local/cuda:ro
      - /usr/lib/aarch64-linux-gnu:/usr/lib/aarch64-linux-gnu:ro
      - /usr/lib/python3.10/dist-packages:/usr/lib/python3.10/dist-packages:ro
      # === Optional: mount local video files ===
      # Uncomment to use video files instead of webcam
      # - ./videos:/app/videos:ro
    devices:
      # USB camera passthrough (comment out if using a video file)
      # Change /dev/video0 to /dev/video1 etc. if using a different camera
      - /dev/video0:/dev/video0
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=XcOGuS__bo4NKPEk0zBYlOBIRrhMXlufMaaVLgmFMObXts_mCF-43kgUWhHGKtQfTEuPITWcB57eI32qlGy5TA==
      - INFLUX_ORG=jetson
      - INFLUX_BUCKET=person_detection
      # VIDEO_SOURCE: 0 = first USB webcam, or /app/videos/xxx.mp4 for video file
      - VIDEO_SOURCE=0
      # DEVICE: auto (detect GPU), cpu, or 0/1/... (GPU index)
      - DEVICE=auto
      - WEB_PORT=5000
      # === Jetson-only: NVIDIA runtime env vars ===
      # Remove on x86 if not using nvidia-docker
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu
      - PYTHONPATH=/usr/lib/python3.10/dist-packages
    networks:
      - yolo11-network
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    runtime: nvidia
    # GPU support - for NVIDIA Jetson with nvidia-docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  yolo11-network:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data:
